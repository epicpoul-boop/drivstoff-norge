<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="logo192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e1e24">

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivstoff Norge</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2b2b36;
            --primary: #ff7a00;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --diesel-color: #ff9800;
            --bensin-color: #4caf50;
            --danger: #ff4444;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --share-color: #4a90e2;
            --success: #4caf50;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 10px; }

        /* Oppdatert Toppliste-kort */
        .leaderboard-card {
            background: linear-gradient(135deg, #3a3a4d 0%, #2b2b36 100%);
            border-radius: 12px; padding: 15px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leader-section { margin-bottom: 12px; }
        .leader-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        .leader-name { font-size: 15px; font-weight: bold; margin-top: 2px; display: block; }
        .gold-txt { color: var(--gold); }
        .silver-txt { color: var(--silver); }
        
        .top-list-btn { 
            width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 5px;
        }
        #top-list-content { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        .panel { background-color: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input[type=text], input[type=number] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background-color: #3f3f4e; color: white; box-sizing: border-box; }
        input[type=range] { width: 100%; accent-color: var(--primary); margin-bottom: 10px; }
        
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .gps-btn { background-color: #3f3f4e; margin-top: 10px; }

        .station-card { background-color: var(--card-bg); border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; border: 2px solid transparent; }
        .best-price-card { border-color: var(--gold); }
        .main-info { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .station-info { flex: 1; display: flex; align-items: flex-start; }
        .brand-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; background: #4a4a5a; }
        
        .prices-container { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .price-row { display: flex; align-items: center; gap: 8px; }
        .price-value { font-size: 16px; font-weight: bold; background-color: #3f3f4e; padding: 4px 8px; border-radius: 6px; min-width: 55px; text-align: right; }
        .verify-badge { color: var(--success); font-size: 14px; margin-left: -5px; }

        .action-buttons { display: flex; gap: 5px; margin-top: 15px; border-top: 1px solid #3f3f4e; padding-top: 10px; }
        .update-btn, .nav-btn, .hist-btn { padding: 8px 4px; font-size: 11px; border-radius: 6px; flex: 1; font-weight: bold; text-align: center; text-decoration: none; cursor:pointer; display: flex; align-items: center; justify-content: center; }
        .update-btn { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .nav-btn { border: 1px solid #4a4a5a; color: #a0a0a0; background: transparent; }
        .hist-btn { border: 1px solid #4a4a5a; color: #a0a0a0; background: transparent; }

        .history-panel { display: none; background: #1e1e24; border-radius: 8px; margin-top: 10px; padding: 10px; font-size: 11px; color: var(--text-muted); }
        .history-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 4px 0; }
        .time-ago { font-size: 10px; color: #7a7a8c; margin-top: 10px; text-align: center; }

        #update-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--card-bg); padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; box-sizing: border-box; }
        #modal-error { color: var(--danger); font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Drivstoff Norge ⛽</h2>

    <div class="leaderboard-card">
        <div class="leader-section">
            <span class="leader-title">Dagens bidragsyter 🏆</span>
            <span id="best-day" class="leader-name gold-txt">Laster...</span>
        </div>
        <div class="leader-section">
            <span class="leader-title">Ukens bidragsyter 🥈</span>
            <span id="best-week" class="leader-name silver-txt">Laster...</span>
        </div>
        <button class="top-list-btn" onclick="toggleTopList()">Se Topp 10 bidragsytere</button>
        
        <div id="top-list-content">
            <div id="top-list-items"></div>
        </div>
    </div>
    
    <div class="panel">
        <label>Søk innenfor: <span id="radius-val">10</span> km</label>
        <input type="range" id="radius" min="1" max="50" value="10" oninput="oppdaterRadiusText()">
        <input type="text" id="stedsnavn" placeholder="By eller sted">
        <button onclick="sokPaaSted()">Søk på sted</button>
        <button class="gps-btn" onclick="startGpsSok()">📍 Bruk min posisjon</button>
    </div>

    <div id="station-list"></div>
</div>

<div id="update-modal">
    <div class="modal-content">
        <h3 id="modal-station-name" style="margin-top:0">Oppdater pris</h3>
        <p id="modal-error"></p>
        <div style="margin-bottom:12px">
            <label style="font-size:12px; color:var(--text-muted)">Kallenavn</label>
            <input type="text" id="input-nickname" placeholder="Ditt navn">
        </div>
        <div style="margin-bottom:12px">
            <label style="color: var(--diesel-color); font-size:12px">Diesel</label>
            <input type="number" id="input-diesel" step="0.01">
        </div>
        <div style="margin-bottom:12px">
            <label style="color: var(--bensin-color); font-size:12px">Bensin 95</label>
            <input type="number" id="input-bensin" step="0.01">
        </div>
        <div style="display:flex; gap:10px">
            <button style="background-color:#555" onclick="lukkModal()">Avbryt</button>
            <button onclick="lagrePris()">Lagre</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlEIj2yxM-mJdBPw7zgDsirF9yAipdPkw",
      authDomain: "drivstoff-norge-caeaa.firebaseapp.com",
      databaseURL: "https://drivstoff-norge-caeaa-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "drivstoff-norge-caeaa",
      storageBucket: "drivstoff-norge-caeaa.firebasestorage.app",
      messagingSenderId: "18889820365",
      appId: "1:18889820365:web:0bd8c054f70452c1ab4184"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = localStorage.getItem('drivstoff_uid') || ('u-' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('drivstoff_uid', myUid);

    let valgtStasjonId = null;
    let gjeldendeStasjoner = [];
    let sisteLat, sisteLon;

    // Henter priser og historikk for å beregne topplister
    onValue(ref(db, 'priser'), async (snapshot) => {
        const priser = snapshot.val() || {};
        const histSnap = await get(ref(db, 'alle_oppdateringer')); // Ny mappe for å telle alt
        beregnTopplister(histSnap.val() || {});
        if (gjeldendeStasjoner.length > 0) visStasjoner(gjeldendeStasjoner, sisteLat, sisteLon, priser);
    });

    function beregnTopplister(alleData) {
        const dagTellere = {};
        const ukeTellere = {};
        const naa = Date.now();
        const enDag = 24 * 60 * 60 * 1000;
        const enUke = 7 * enDag;

        Object.values(alleData).forEach(p => {
            if (!p.user) return;
            const alder = naa - p.timestamp;
            if (alder < enDag) dagTellere[p.user] = (dagTellere[p.user] || 0) + 1;
            if (alder < enUke) ukeTellere[p.user] = (ukeTellere[p.user] || 0) + 1;
        });

        const dagSortert = Object.entries(dagTellere).sort((a,b) => b[1]-a[1]);
        const ukeSortert = Object.entries(ukeTellere).sort((a,b) => b[1]-a[1]);

        document.getElementById('best-day').innerText = dagSortert.length ? `${dagSortert[0][0]} (${dagSortert[0][1]} stk)` : "Ingen enda i dag";
        document.getElementById('best-week').innerText = ukeSortert.length ? `${ukeSortert[0][0]} (${ukeSortert[0][1]} stk)` : "Ingen enda denne uken";

        document.getElementById('top-list-items').innerHTML = ukeSortert.slice(0, 10).map((u, i) => `
            <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #333; font-size:13px">
                <span>${i+1}. ${u[0]}</span>
                <span>${u[1]} oppd.</span>
            </div>
        `).join('');
    }

    window.toggleTopList = function() {
        const c = document.getElementById('top-list-content');
        c.style.display = c.style.display === 'block' ? 'none' : 'block';
    }

    window.lagrePris = async function() {
        const d = document.getElementById('input-diesel').value;
        const b = document.getElementById('input-bensin').value;
        const n = document.getElementById('input-nickname').value.trim();
        if(!n || !d || !b) return;

        const nameRef = ref(db, 'users/' + n.toLowerCase());
        const nameSnap = await get(nameRef);
        if (nameSnap.exists() && nameSnap.val() !== myUid) {
            document.getElementById('modal-error').innerText = "Navnet er tatt!";
            document.getElementById('modal-error').style.display = "block"; return;
        }

        await set(nameRef, myUid);
        localStorage.setItem('drivstoff_navn', n);

        const currentRef = ref(db, 'priser/' + valgtStasjonId);
        const currentSnap = await get(currentRef);
        const oldData = currentSnap.val();

        let verified = false;
        if (oldData && oldData.uid !== myUid && oldData.diesel === d && oldData.bensin === b) {
            if (Date.now() - oldData.timestamp < 86400000) verified = true;
        }

        const newData = { diesel: d, bensin: b, timestamp: Date.now(), user: n, uid: myUid, verified: verified };
        
        await set(currentRef, newData);
        push(ref(db, 'historikk/' + valgtStasjonId), newData);
        push(ref(db, 'alle_oppdateringer'), newData); // Lagrer her for toppliste-beregning
        
        lukkModal();
    };

    // --- Standard visnings- og søkefunksjoner ---
    window.visHistorikk = async function(id) {
        const p = document.getElementById('hist-' + id);
        if (p.style.display === 'block') { p.style.display = 'none'; return; }
        p.style.display = 'block'; p.innerText = "Henter...";
        const snap = await get(ref(db, 'historikk/' + id));
        const data = snap.val();
        if (!data) { p.innerText = "Ingen historikk."; return; }
        const h = Object.values(data).reverse().slice(1, 4);
        p.innerHTML = h.length ? h.map(i => `<div class="history-item"><span>D: ${i.diesel} | 95: ${i.bensin}</span><span>${new Date(i.timestamp).toLocaleDateString()}</span></div>`).join('') : "Ingen tidligere data.";
    }

    function visStasjoner(stasjoner, lat, lon, priser) {
        const list = document.getElementById('station-list'); list.innerHTML = "";
        const sorted = [...stasjoner].sort((a,b) => (parseFloat(priser[a.id]?.diesel)||99) - (parseFloat(priser[b.id]?.diesel)||99));
        sorted.forEach(s => {
            const id = s.id; const p = priser[id] || { diesel: "--", bensin: "--" };
            const dist = regnUtAvstand(lat, lon, s.lat, s.lon);
            const card = document.createElement('div'); card.className = `station-card`;
            card.innerHTML = `<div class="main-info"><div class="station-info"><div class="brand-icon">⛽</div><div class="station-details"><h3>${s.tags.name || "Stasjon"}</h3><p>${dist.toFixed(1)} km unna</p></div></div><div class="prices-container"><div class="price-row">D <div class="price-value">${p.diesel}</div> ${p.verified?'<span class="verify-badge">✅</span>':''}</div><div class="price-row">95 <div class="price-value">${p.bensin}</div> ${p.verified?'<span class="verify-badge">✅</span>':''}</div></div></div><div class="action-buttons"><div class="update-btn" onclick="apneModal(${id},'${s.tags.name||'Stasjon'}',${JSON.stringify(priser)})">OPPDATER</div><a class="nav-btn" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}" target="_blank">KJØR HIT</a><div class="hist-btn" onclick="visHistorikk(${id})">⌛ HISTORIKK</div></div><div id="hist-${id}" class="history-panel"></div><div class="time-ago">${formaterTid(p.timestamp, p.user)}</div>`;
            list.appendChild(card);
        });
    }

    window.lukkModal = () => document.getElementById('update-modal').style.display='none';
    window.oppdaterRadiusText = () => document.getElementById('radius-val').innerText = document.getElementById('radius').value;
    window.apneModal = (id, n) => { valgtStasjonId = id; document.getElementById('modal-station-name').innerText = n; document.getElementById('input-nickname').value = localStorage.getItem('drivstoff_navn') || ""; document.getElementById('update-modal').style.display = 'block'; };
    window.sokPaaSted = async function() { const s = document.getElementById('stedsnavn').value; const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(s)},Norge&format=json&limit=1`); const d = await res.json(); if(d.length>0) hentStasjoner(parseFloat(d[0].lat), parseFloat(d[0].lon)); };
    window.startGpsSok = () => navigator.geolocation.getCurrentPosition(p => hentStasjoner(p.coords.latitude, p.coords.longitude));
    async function hentStasjoner(lat, lon) { sisteLat=lat; sisteLon=lon; const r=document.getElementById('radius').value*1000; const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(`[out:json];node["amenity"="fuel"](around:${r},${lat},${lon});out;`)}`); const data = await res.json(); gjeldendeStasjoner = data.elements; get(ref(db, 'priser')).then(snap => visStasjoner(gjeldendeStasjoner, lat, lon, snap.val()||{})); }
    function formaterTid(ts, u) { if(!ts) return "Aldri"; const d = Math.floor((Date.now()-ts)/1000); let txt = d<60?"nå":d<3600?Math.floor(d/60)+"m":d<86400?Math.floor(d/3600)+"t":Math.floor(d/86400)+"d"; return `Sist: ${txt} siden ${u?'av '+u:''}`; }
    function regnUtAvstand(l1,o1,l2,o2){const R=6371;const dL=(l2-l1)*Math.PI/180;const dO=(o2-o1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
</script>
</body>
</html>
